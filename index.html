<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOHAIB WEB</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at 90% 90%, rgba(154,82,255,.7), transparent 25%),
    radial-gradient(circle at 75% 75%, rgba(0,119,255,.4), transparent 30%),
    linear-gradient(135deg,#01081d,#071b4d,#0c2f92);
    color:#fff;
    overflow:hidden;
}

/* Navbar */

nav{
    width:90%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 0;
}

.logo{
    font-size:38px;
    font-weight:700;
}

nav ul{
    display:flex;
    list-style:none;
    gap:45px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:20px;
    transition:.3s;
}

nav ul li a:hover{
    color:#4da3ff;
}

/* Hero */

.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:110px;
    font-weight:800;
    letter-spacing:4px;
}

.line{
    width:120px;
    height:4px;
    background:#6b6bff;
    margin:20px 0;
    border-radius:20px;
}

.hero p{
    font-size:32px;
    color:#ddd;
}

.btn{
    margin-top:50px;
    padding:18px 55px;
    text-decoration:none;
    color:white;
    font-size:24px;
    border-radius:15px;
    background:linear-gradient(90deg,#1d73ff,#7d43ff);
    transition:.4s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* Scroll Icon */

.scroll{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:65px;
    height:65px;
    border:2px solid white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateX(-50%) translateY(0);
    }
    50%{
        transform:translateX(-50%) translateY(10px);
    }
}

@media(max-width:768px){

.hero h1{
    font-size:60px;
}

.hero p{
    font-size:20px;
}

nav ul{
    gap:20px;
}

nav ul li a{
    font-size:16px;
}

.logo{
    font-size:25px;
}

}

</style>

</head>
<body>

<nav>

<div class="logo">SOHAIB WEB</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<p>Welcome to My Website</p>

</section>

</body>
</html>
